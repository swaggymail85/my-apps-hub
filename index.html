<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Web Apps Hub</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #f0f2f5;
        }

        /* The 3-column layout: Left Ad, Middle Apps, Right Ad */
        .page-container {
            display: grid;
            grid-template-columns: 200px 1fr 200px;
            min-height: 100vh;
            gap: 20px;
        }

        /* Sidebar Ad spaces */
        .ad-banner {
            background-color: #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-weight: bold;
            color: #666;
            padding: 10px;
        }

        /* Central content area */
        .main-content {
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .donate-btn {
            background-color: #ff4757;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 30px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }

        .donate-btn:hover {
            transform: scale(1.05);
        }

        /* Grid for the App Cards */
        .apps-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 900px;
        }

        /* Individual App Card Styling */
        .app-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            text-decoration: none;
            color: #333;
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
        }

        .app-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
        }

        .app-icon {
            font-size: 40px;
            margin-bottom: 10px;
        }

        .app-title {
            font-size: 16px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="page-container">
        
        <!-- LEFT AD BANNER -->
        <aside class="ad-banner">
            Left Ad Space<br>(Google AdSense)
        </aside>

        <!-- MAIN AREA -->
        <main class="main-content">
            
            <h1>🛠️ Free Local Web Apps</h1>
            
            <!-- Keep Alive Button -->
            <button class="donate-btn" onclick="window.open('https://ko-fi.com', '_blank')">
                ❤️ Keep This Site Alive (Donate)
            </button>

            <!-- This is where your apps will automatically show up -->
            <div class="apps-grid" id="apps-container">
                <!-- Fallback app card in case GitHub API is slow -->
                <a href="apps/photo-editor.html" class="app-card">
                    <div class="app-icon">📸</div>
                    <div class="app-title">Photo Editor</div>
                </a>
            </div>

        </main>

        <!-- RIGHT AD BANNER -->
        <aside class="ad-banner">
            Right Ad Space<br>(Google AdSense)
        </aside>

    </div>

    <script>
        // SMART SCRIPT: Automatically reads your 'apps' folder from GitHub and displays them!
        // Replace 'YOUR_GITHUB_USERNAME' and 'YOUR_REPO_NAME' below
        const username = 'YOUR_GITHUB_USERNAME';
        const repo = 'YOUR_REPO_NAME';
        
        async function loadApps() {
            try {
                const response = await fetch(`https://api.github.com/repos/${username}/${repo}/contents/apps`);
                const files = await response.json();
                const container = document.getElementById('apps-container');
                
                // Clear out the static example and load everything fresh
                container.innerHTML = '';

                files.forEach(file => {
                    if (file.name.endsWith('.html')) {
                        // Cleans up the filename for the display title (e.g., "photo-editor.html" -> "Photo Editor")
                        let displayTitle = file.name
                            .replace('.html', '')
                            .split('-')
                            .map(word => word.charAt(0).toUpperCase() + word.slice(1))
                            .join(' ');

                        // Create the HTML card
                        const card = document.createElement('a');
                        card.href = `apps/${file.name}`;
                        card.className = 'app-card';
                        
                        // Default app icon. You can customize icons later!
                        card.innerHTML = `
                            <div class="app-icon">⚙️</div>
                            <div class="app-title">${displayTitle}</div>
                        `;
                        
                        container.appendChild(card);
                    }
                });
            } catch (error) {
                console.error("Error loading apps automatically:", error);
            }
        }

        // Run the function when the page loads
        loadApps();
    </script>
</body>
</html>
