<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web App Console v1.00</title>
    <style>
        /* Classic Windows 98 / 2000 Operating System Theme */
        body {
            background-color: #3a6ea5; /* Standard vintage desktop blue-teal */
            color: #000000;
            font-family: "MS Sans Serif", Geneva, sans-serif;
            font-size: 13px;
            margin: 0;
            padding: 10px;
            min-height: 100vh;
            overflow: hidden; /* Keeps the desktop fixed */
        }

        /* 3-Column Desktop Grid */
        .desktop-container {
            display: grid;
            grid-template-columns: 180px 1fr 180px;
            gap: 15px;
            height: calc(100vh - 20px);
        }

        /* Retro Desktop Ad Columns styled as inset panels */
        .desktop-ad {
            background-color: #d4d0c8;
            border-top: 2px solid #404040;
            border-left: 2px solid #404040;
            border-right: 2px solid #ffffff;
            border-bottom: 2px solid #ffffff;
            padding: 10px;
            text-align: center;
            font-weight: bold;
            color: #555;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
        }

        /* The Main OS Window Container */
        .app-window {
            background-color: #d4d0c8;
            border-top: 2px solid #ffffff;
            border-left: 2px solid #ffffff;
            border-right: 2px solid #404040;
            border-bottom: 2px solid #404040;
            box-shadow: 2px 2px 8px rgba(0, 0, 0, 0.3);
            padding: 4px; 
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        /* Standard Retro Title Bar */
        .title-bar {
            background: linear-gradient(90deg, #000080, #1084d0);
            color: #ffffff;
            padding: 4px 6px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .title-bar-text {
            letter-spacing: 0.5px;
        }

        /* Window action buttons */
        .title-bar-controls button {
            padding: 0 4px;
            font-size: 10px;
            font-weight: bold;
            background-color: #d4d0c8;
            border-top: 1px solid #ffffff;
            border-left: 1px solid #ffffff;
            border-right: 1px solid #404040;
            border-bottom: 1px solid #404040;
            cursor: pointer;
        }

        /* Workspace Background Panel */
        .window-body {
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
            min-height: 0; /* Allows inner content to structure properly */
            position: relative; /* Anchor point for loading absolute positioning */
        }

        h1 {
            font-size: 18px;
            margin: 5px 0 2px 0;
            font-weight: bold;
        }

        .subtitle {
            color: #555;
            font-size: 11px;
            margin-bottom: 15px;
        }

        /* Classic Beveled Push Button for Donations */
        .donate-btn {
            background-color: #d4d0c8;
            border-top: 2px solid #ffffff;
            border-left: 2px solid #ffffff;
            border-right: 2px solid #404040;
            border-bottom: 2px solid #404040;
            padding: 6px 20px;
            font-family: inherit;
            font-weight: bold;
            cursor: pointer;
            box-shadow: inset 1px 1px 0px #fff;
            margin-bottom: 20px;
        }

        .donate-btn:active {
            border-top: 2px solid #404040;
            border-left: 2px solid #404040;
            border-right: 2px solid #ffffff;
            border-bottom: 2px solid #ffffff;
            box-shadow: none;
            padding: 7px 19px 5px 21px;
        }

        /* BACK BUTTON for when an app is open */
        .back-btn {
            display: none; /* Hidden by default */
            align-self: flex-start;
            background-color: #d4d0c8;
            border-top: 2px solid #ffffff;
            border-left: 2px solid #ffffff;
            border-right: 2px solid #404040;
            border-bottom: 2px solid #404040;
            padding: 4px 12px;
            font-family: inherit;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 15px;
        }

        .back-btn:active {
            border-top: 2px solid #404040;
            border-left: 2px solid #404040;
            border-right: 2px solid #ffffff;
            border-bottom: 2px solid #ffffff;
        }

        /* The App Program Manager Grid */
        .apps-grid {
            border-top: 2px solid #404040;
            border-left: 2px solid #404040;
            border-right: 2px solid #ffffff;
            border-bottom: 2px solid #ffffff;
            background: #ffffff; 
            padding: 15px;
            width: 100%;
            height: 100%;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: 20px;
            overflow-y: auto;
            align-content: start;
        }

        /* Vintage Loading Screen Box Component */
        #loading-screen {
            display: none; /* Hidden by default */
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            background-color: #d4d0c8;
            border-top: 2px solid #404040;
            border-left: 2px solid #404040;
            border-right: 2px solid #ffffff;
            border-bottom: 2px solid #ffffff;
            color: #000;
        }

        .pixel-art-wizard {
            font-size: 48px;
            margin-bottom: 15px;
            animation: retro-bounce 1s steps(2, start) infinite;
        }

        .loading-text {
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 0.5px;
            text-align: center;
        }

        @keyframes retro-bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }

        /* Smooth Iframe Container for App Execution */
        #app-frame {
            display: none; /* Hidden until an app is clicked */
            width: 100%;
            height: 100%;
            border-top: 2px solid #404040;
            border-left: 2px solid #404040;
            border-right: 2px solid #ffffff;
            border-bottom: 2px solid #ffffff;
            background: #fff;
        }

        /* Vintage Shortcut Icon Style */
        .app-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            text-decoration: none;
            color: #000000;
            cursor: pointer;
            padding: 5px;
            border: 1px dashed transparent;
        }

        .app-card:hover {
            background-color: #000080;
            color: #ffffff;
            border: 1px dashed #ffff00;
        }

        .app-icon {
            font-size: 36px;
            margin-bottom: 6px;
            user-select: none;
        }

        .app-title {
            font-size: 11px;
            word-break: break-word;
            line-height: 1.2;
        }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            .desktop-container {
                grid-template-columns: 1fr;
            }
            .desktop-ad {
                display: none;
            }
        }
    </style>
</head>
<body>

    <div class="desktop-container">
        
        <aside class="desktop-ad">
            AD_SLOT_LEFT<br><br>160 x 600<br>STAYS ON SCREEN
        </aside>

        <main class="app-window">
            <div class="title-bar">
                <span class="title-bar-text" id="window-title">📁 Application Manager - C:\WebApps</span>
                <div class="title-bar-controls">
                    <button>_</button>
                    <button>🗖</button>
                    <button onclick="closeApp()">X</button>
                </div>
            </div>

            <div class="window-body">
                
                <div id="main-headers" style="width: 100%; text-align: center;">
                    <h1>Software Directory</h1>
                    <div class="subtitle">Select a module to execute program natively in memory</div>
                    
                    <button class="donate-btn" onclick="window.open('https://ko-fi.com', '_blank')">
                        Support System (Donate)
                    </button>
                </div>

                <button class="back-btn" id="back-button" onclick="closeApp()">🡰 Back to Directory</button>

                <div class="apps-grid" id="apps-container">
                    <div style="grid-column: 1/-1; text-align: center; color: #555; padding-top: 50px;">
                        Reading file tree indices...
                    </div>
                </div>

                <div id="loading-screen">
                    <div class="pixel-art-wizard">🧙‍♂️⏳</div>
                    <div class="loading-text">Your App is Loading, wait 10 seconds please...</div>
                </div>

                <iframe id="app-frame" src="" onload="hideLoading()"></iframe>
            </div>
        </main>

        <aside class="desktop-ad">
            AD_SLOT_RIGHT<br><br>160 x 600<br>STAYS ON SCREEN
        </aside>

    </div>

    <script>
        const username = 'swaggymail85';
        const repo = 'my-apps-hub';
        
        async function loadApps() {
            try {
                const response = await fetch(`https://api.github.com/repos/${username}/${repo}/contents/apps`);
                if (!response.ok) throw new Error('File tree unreadable');
                const files = await response.json();
                const container = document.getElementById('apps-container');
                
                container.innerHTML = ''; 

                const winIcons = ["💾", "💽", "🛠️", "⚙️", "🎨", "🖼️", "📊", "📷"];

                files.forEach((file, index) => {
                    if (file.name.endsWith('.html')) {
                        let displayTitle = file.name
                            .replace('.html', '')
                            .split('-')
                            .join(' ')
                            .toUpperCase();

                        let selectedIcon = winIcons[index % winIcons.length];

                        const card = document.createElement('div');
                        card.className = 'app-card';
                        card.onclick = () => launchApp(`https://raw.githack.com/${username}/${repo}/main/apps/${file.name}`, displayTitle);
                        card.innerHTML = `
                            <div class="app-icon">${selectedIcon}</div>
                            <div class="app-title">${displayTitle}</div>
                        `;
                        
                        container.appendChild(card);
                    }
                });

                if(container.innerHTML === '') {
                    container.innerHTML = '<div style="grid-column:1/-1; text-align:center; color:red; padding-top:50px;">[Error 404] Directory is empty.</div>';
                }

            } catch (error) {
                console.error(error);
                document.getElementById('apps-container').innerHTML = '<div style="grid-column:1/-1; text-align:center; color:red; padding-top:50px;">[Fatal System Error] Link stream broken.</div>';
            }
        }

        // FUNCTION TO LAUNCH THE APP INSIDE THE IFRAME
        function launchApp(url, title) {
            document.getElementById('main-headers').style.display = 'none'; // Hide headers
            document.getElementById('apps-container').style.display = 'none'; // Hide grid
            
            // Activate retro loading box instead of showing iframe immediately
            document.getElementById('loading-screen').style.display = 'flex';
            
            const frame = document.getElementById('app-frame');
            frame.src = url; // Inject the app file and begin hidden stream compilation
            
            document.getElementById('back-button').style.display = 'block'; // Show back arrow
            document.getElementById('window-title').innerText = `💻 Running: C:\\WebApps\\${title.toLowerCase().replace(' ', '_')}.exe`; // Change title bar
        }

        // TRIGGERED DIRECTLY VIA NATIVE IFRAME ONLOAD PROPERTY
        function hideLoading() {
            const frame = document.getElementById('app-frame');
            // Ensure we only show it if an actual source link is actively processed
            if (frame.src !== "" && frame.src !== window.location.href) {
                document.getElementById('loading-screen').style.display = 'none'; // Turn off loading element
                frame.style.display = 'block'; // Reveal ready application workspace
            }
        }

        // FUNCTION TO CLOSE APP AND GO BACK TO SYSTEM DIRECTORY
        function closeApp() {
            const frame = document.getElementById('app-frame');
            frame.style.display = 'none'; // Hide frame
            frame.src = ''; // Clear memory pipeline
            
            document.getElementById('loading-screen').style.display = 'none'; // Safeguard clear loading display
            document.getElementById('main-headers').style.display = 'block'; // Bring headers/donate button back
            document.getElementById('apps-container').style.display = 'grid'; // Show icons again
            document.getElementById('back-button').style.display = 'none'; // Hide back arrow
            document.getElementById('window-title').innerText = "📁 Application Manager - C:\\WebApps"; // Reset title bar
        }

        loadApps();
    </script>
</body>
</html>
