<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRUE MP4 COMPILER v3.0 (CODEPEN COMPATIBLE)</title>
    <style>
        /* 90s/2000s Win98 & Multimedia Application Theme */
        body {
            background-color: #3a6ea5; /* Classic retro desktop blue */
            color: #000000;
            font-family: "MS Sans Serif", Geneva, sans-serif;
            font-size: 13px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        .app-window {
            background-color: #d4d0c8;
            border-top: 2px solid #ffffff;
            border-left: 2px solid #ffffff;
            border-right: 2px solid #404040;
            border-bottom: 2px solid #404040;
            box-shadow: 3px 3px 10px rgba(0, 0, 0, 0.4);
            padding: 15px;
            width: 100%;
            max-width: 600px;
        }

        .title-bar {
            background: linear-gradient(90deg, #000080, #1084d0);
            color: #ffffff;
            padding: 4px 6px;
            font-weight: bold;
            letter-spacing: 1px;
            margin-bottom: 15px;
            border-bottom: 1px solid #777;
            text-shadow: 1px 1px #000;
        }

        .controls-panel {
            border-top: 2px solid #404040;
            border-left: 2px solid #404040;
            border-right: 2px solid #ffffff;
            border-bottom: 2px solid #ffffff;
            background-color: #cbd2d6;
            padding: 15px;
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .control-group {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }

        label {
            font-weight: bold;
            flex: 1;
            text-shadow: 1px 1px 0px #ffffff;
        }

        .input-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1.5;
            justify-content: flex-end;
        }

        select, input[type="number"] {
            background: #ffffff;
            color: #000000;
            border-top: 2px solid #404040;
            border-left: 2px solid #404040;
            border-right: 1px solid #ffffff;
            border-bottom: 1px solid #ffffff;
            padding: 3px;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
        }

        input[type="number"] { width: 50px; text-align: center; }
        select { width: 80px; }

        .file-upload-box {
            border-top: 2px solid #404040;
            border-left: 2px solid #404040;
            border-right: 1px solid #ffffff;
            border-bottom: 1px solid #ffffff;
            background: #ffffff;
            padding: 8px;
            margin-bottom: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .file-input-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .file-input-container span {
            font-weight: bold;
            text-shadow: 1px 1px 0px #ffffff;
        }

        .progress-container {
            display: none;
            margin-top: 15px;
            border-top: 2px solid #404040;
            border-left: 2px solid #404040;
            border-right: 1px solid #ffffff;
            border-bottom: 1px solid #ffffff;
            background: #ffffff;
            padding: 2px;
            height: 20px;
            position: relative;
        }

        .progress-bar {
            background-color: #000080;
            width: 0%;
            height: 100%;
        }

        .progress-text {
            position: absolute;
            width: 100%;
            text-align: center;
            top: 4px;
            font-weight: bold;
            mix-blend-mode: difference;
            color: #fff;
        }

        .preview-frame {
            border-top: 3px solid #404040;
            border-left: 3px solid #404040;
            border-right: 2px solid #ffffff;
            border-bottom: 2px solid #ffffff;
            background: #000000;
            padding: 4px;
            margin-top: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 200px;
        }

        canvas { display: block; max-width: 100%; height: auto; }

        .action-btn {
            margin-top: 15px;
            width: 100%;
            background-color: #d4d0c8;
            border-top: 2px solid #ffffff;
            border-left: 2px solid #ffffff;
            border-right: 2px solid #404040;
            border-bottom: 2px solid #404040;
            padding: 10px;
            font-family: inherit;
            font-weight: bold;
            cursor: pointer;
            box-shadow: inset 1px 1px 0px #fff;
        }

        .action-btn:active {
            border-top: 2px solid #404040;
            border-left: 2px solid #404040;
            border-right: 2px solid #ffffff;
            border-bottom: 2px solid #ffffff;
            box-shadow: none;
            padding: 11px 9px 9px 11px;
        }

        #downloadBtn {
            background-color: #4caf50;
            color: white;
            text-shadow: 1px 1px 0px #000;
            display: none;
        }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/ffmpeg/0.11.6/ffmpeg.min.js"></script>
</head>
<body>

    <div class="app-window">
        <div class="title-bar">TRUE MP4 ENGINE v3.0 (SECURE IFRAME COMPATIBLE)</div>

        <div class="file-upload-box">
            <div class="file-input-container">
                <span>Source Image:</span>
                <input type="file" id="imageLoader" accept="image/*">
            </div>
            <div class="file-input-container">
                <span>Source Audio:</span>
                <input type="file" id="audioLoader" accept="audio/*">
            </div>
        </div>
        
        <div class="controls-panel">
            <div class="control-group">
                <label><input type="checkbox" id="fadeInCheck"> Enable Fade In</label>
                <div class="input-wrapper">
                    <span>Duration (s):</span>
                    <input type="number" id="fadeInDuration" min="1" max="60" value="5">
                </div>
            </div>

            <div class="control-group">
                <label><input type="checkbox" id="fadeOutCheck"> Enable Fade Out</label>
                <div class="input-wrapper">
                    <span>Duration (s):</span>
                    <input type="number" id="fadeOutDuration" min="1" max="60" value="5">
                </div>
            </div>

            <div class="control-group">
                <label for="fadeColor">Fade Base Color:</label>
                <div class="input-wrapper">
                    <input type="color" id="fadeColor" value="#000000">
                </div>
            </div>

            <div class="control-group">
                <label for="frameRate">Export Frame Rate:</label>
                <div class="input-wrapper">
                    <select id="frameRate">
                        <option value="1" selected>1 FPS</option>
                        <option value="5">5 FPS</option>
                        <option value="10">10 FPS</option>
                        <option value="24">24 FPS</option>
                        <option value="30">30 FPS</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="preview-frame">
            <canvas id="videoCanvas" width="640" height="480"></canvas>
        </div>

        <div class="progress-container" id="progressContainer">
            <div class="progress-bar" id="progressBar"></div>
            <div class="progress-text" id="progressText">Initializing Engine...</div>
        </div>

        <button class="action-btn" id="exportBtn">RENDER TRUE MP4</button>
        <button class="action-btn" id="downloadBtn">DOWNLOAD VIDEO</button>
    </div>

    <script>
        const { createFFmpeg, fetchFile } = FFmpeg;
        
        // CRITICAL FIX: Explicitly forcing the Single-Thread version of the core compilation files
        // This stops CodePen iframe containers from rejecting/freezing the process
        const ffmpeg = createFFmpeg({
            log: true,
            mainName: 'main',
            corePath: 'https://unpkg.com/@ffmpeg/core-st@0.11.1/dist/ffmpeg-core.js'
        });

        const imageLoader = document.getElementById('imageLoader');
        const audioLoader = document.getElementById('audioLoader');
        const canvas = document.getElementById('videoCanvas');
        const ctx = canvas.getContext('2d');
        
        const fadeInCheck = document.getElementById('fadeInCheck');
        const fadeInDurationInput = document.getElementById('fadeInDuration');
        const fadeOutCheck = document.getElementById('fadeOutCheck');
        const fadeOutDurationInput = document.getElementById('fadeOutDuration');
        const fadeColorInput = document.getElementById('fadeColor');
        const frameRateSelect = document.getElementById('frameRate');
        
        const exportBtn = document.getElementById('exportBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const progressContainer = document.getElementById('progressContainer');
        const progressBar = document.getElementById('progressBar');
        const progressText = document.getElementById('progressText');

        let loadedImage = null;
        let audioBlob = null;
        let audioDuration = 0;
        let mp4FileBlobUrl = null;

        ctx.fillStyle = "#000000";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#ffffff";
        ctx.font = "14px Arial";
        ctx.textAlign = "center";
        ctx.fillText("True MP4 System Ready", canvas.width / 2, canvas.height / 2);

        imageLoader.addEventListener('change', (e) => {
            const reader = new FileReader();
            reader.onload = (event) => {
                loadedImage = new Image();
                loadedImage.onload = () => {
                    canvas.width = loadedImage.width;
                    canvas.height = loadedImage.height;
                    ctx.drawImage(loadedImage, 0, 0);
                };
                loadedImage.src = event.target.result;
            };
            reader.readAsDataURL(e.target.files[0]);
        });

        audioLoader.addEventListener('change', (e) => {
            audioBlob = e.target.files[0];
            const audioEl = document.createElement('audio');
            audioEl.src = URL.createObjectURL(audioBlob);
            audioEl.onloadedmetadata = () => {
                audioDuration = audioEl.duration;
            };
        });

        function applyFades(frameIndex, fps) {
            ctx.drawImage(loadedImage, 0, 0);
            const currentTime = frameIndex / fps;
            let opacity = 0;

            if (fadeInCheck.checked) {
                const duration = parseFloat(fadeInDurationInput.value);
                if (currentTime < duration) opacity = 1 - (currentTime / duration);
            }
            if (fadeOutCheck.checked) {
                const duration = parseFloat(fadeOutDurationInput.value);
                if (currentTime > (audioDuration - duration)) {
                    opacity = (currentTime - (audioDuration - duration)) / duration;
                }
            }

            if (opacity > 0) {
                ctx.save();
                ctx.globalAlpha = Math.min(1, Math.max(0, opacity));
                ctx.fillStyle = fadeColorInput.value;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.restore();
            }
        }

        exportBtn.addEventListener('click', async () => {
            if (!loadedImage || !audioBlob) {
                alert("Please attach both your image and audio track assets first!");
                return;
            }

            exportBtn.disabled = true;
            downloadBtn.style.display = "none";
            progressContainer.style.display = "block";
            
            progressBar.style.width = '10%';
            progressText.innerText = "Loading local sandbox compiler engine...";

            // Bypasses sandbox error flags smoothly now
            if (!ffmpeg.isLoaded()) {
                await ffmpeg.load();
            }

            const fps = parseInt(frameRateSelect.value);
            const totalFrames = Math.ceil(audioDuration * fps);

            progressBar.style.width = '20%';
            progressText.innerText = "Processing source images...";

            // 1. Process frames instantly in a fast memory loop
            for (let i = 0; i < totalFrames; i++) {
                applyFades(i, fps);
                
                const dataUrl = canvas.toDataURL('image/jpeg', 0.9);
                const base64Data = dataUrl.split(',')[1];
                const binaryData = atob(base64Data);
                const array = new Uint8Array(binaryData.length);
                for (let j = 0; j < binaryData.length; j++) {
                    array[j] = binaryData.charCodeAt(j);
                }

                const paddedIndex = String(i).padStart(5, '0');
                ffmpeg.FS('writeFile', `frame_${paddedIndex}.jpg`, array);

                if (i % Math.max(1, Math.floor(totalFrames / 10)) === 0) {
                    const progressVal = 20 + Math.floor((i / totalFrames) * 40);
                    progressBar.style.width = `${progressVal}%`;
                    progressText.innerText = `Baking frame data (${i}/${totalFrames})...`;
                }
                // Yield thread briefly to avoid freezing browser window entirely
                await new Promise(r => setTimeout(r, 1));
            }

            progressBar.style.width = '65%';
            progressText.innerText = "Muxing audio channels...";
            
            ffmpeg.FS('writeFile', 'audio.mp3', await fetchFile(audioBlob));

            progressBar.style.width = '80%';
            progressText.innerText = "Encoding genuine H.264 MP4 container file...";

            // 2. Transcode natively to H.264 and AAC audio for an industry standard playable file
            await ffmpeg.run(
                '-r', `${fps}`,
                '-i', 'frame_%05d.jpg',
                '-i', 'audio.mp3',
                '-c:v', 'libx264',
                '-pix_fmt', 'yuv420p',
                '-c:a', 'aac',
                '-shortest',
                'output.mp4'
            );

            progressBar.style.width = '95%';
            progressText.innerText = "Finalizing streaming layouts...";

            const finalData = ffmpeg.FS('readFile', 'output.mp4');
            const nativeMp4Blob = new Blob([finalData.buffer], { type: 'video/mp4' });
            mp4FileBlobUrl = URL.createObjectURL(nativeMp4Blob);

            // 3. Clear file buffers to preserve page resources
            for (let i = 0; i < totalFrames; i++) {
                ffmpeg.FS('unlink', `frame_${String(i).padStart(5, '0')}.jpg`);
            }
            ffmpeg.FS('unlink', 'audio.mp3');
            ffmpeg.FS('unlink', 'output.mp4');

            progressBar.style.width = '100%';
            progressText.innerText = "Done! Genuine MP4 created successfully.";
            exportBtn.disabled = false;
            downloadBtn.style.display = "block";
        });

        downloadBtn.addEventListener('click', () => {
            if (mp4FileBlobUrl) {
                const link = document.createElement('a');
                link.download = 'perfect_render.mp4';
                link.href = mp4FileBlobUrl;
                link.click();
            }
        });
    </script>
</body>
</html>
