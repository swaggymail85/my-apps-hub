<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Audio Studio Master Pipeline (Max Speed WAV Edition)</title>
  
  <style>
    :root {
      --bg-dark: #0a0512;
      --glass-bg: rgba(23, 15, 38, 0.6);
      --glass-border: rgba(168, 85, 247, 0.2);
      --text-main: #f3e8ff;
      --text-muted: #c084fc;
      --accent: #d946ef;
      --accent-hover: #f472b6;
      --success: #22c55e;
      --error: #ef4444;
      --input-bg: rgba(10, 5, 18, 0.5);
      --glow: rgba(217, 70, 239, 0.15);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
    }

    body {
      background: radial-gradient(circle at 50% 0%, #2e1065 0%, var(--bg-dark) 70%);
      background-attachment: fixed;
      color: var(--text-main);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .app-container {
      width: 100%;
      max-width: 1200px;
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    .app-header {
      text-align: center;
    }

    .app-header h1 {
      font-size: 2.4rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #f472b6 0%, #a855f7 50%, #6366f1 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 40px rgba(168, 85, 247, 0.2);
    }

    .app-header p {
      color: var(--text-muted);
      font-size: 0.95rem;
      opacity: 0.8;
    }

    .app-body {
      display: grid;
      grid-template-columns: 1fr;
      gap: 24px;
    }

    @media (min-width: 950px) {
      .app-body {
        grid-template-columns: 1fr 1.2fr;
      }
    }

    .card {
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      padding: 28px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
    }

    .drop-zone {
      border: 2px dashed rgba(168, 85, 247, 0.4);
      border-radius: 12px;
      padding: 40px 16px;
      text-align: center;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      background: rgba(168, 85, 247, 0.02);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .drop-zone:hover {
      border-color: var(--accent);
      background: rgba(217, 70, 239, 0.05);
      box-shadow: 0 0 20px var(--glow);
    }

    .drop-zone input[type="file"] {
      display: none;
    }

    .upload-icon {
      width: 44px;
      height: 44px;
      color: var(--accent);
      margin-bottom: 4px;
      filter: drop-shadow(0 0 8px rgba(217, 70, 239, 0.5));
    }

    .drop-zone-text {
      font-weight: 600;
      font-size: 1.05rem;
      letter-spacing: -0.01em;
    }

    .drop-zone-sub {
      font-size: 0.85rem;
      color: var(--text-muted);
      opacity: 0.7;
    }

    .settings-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .input-group label {
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .input-field {
      background-color: var(--input-bg);
      border: 1px solid var(--glass-border);
      border-radius: 8px;
      padding: 12px 16px;
      color: var(--text-main);
      font-size: 0.95rem;
      outline: none;
      transition: all 0.2s;
    }

    .input-field:focus {
      border-color: var(--accent);
      box-shadow: 0 0 15px var(--glow);
      background-color: rgba(10, 5, 18, 0.7);
    }

    .status-banner {
      background: rgba(168, 85, 247, 0.1);
      border-radius: 8px;
      padding: 14px;
      font-size: 0.9rem;
      text-align: center;
      color: #f3e8ff;
      border-left: 4px solid var(--accent);
      font-weight: 600;
    }

    .btn {
      padding: 14px 20px;
      border-radius: 8px;
      font-weight: 700;
      border: none;
      cursor: pointer;
      font-size: 1rem;
      letter-spacing: -0.01em;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .w-full {
      width: 100%;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent) 0%, #a855f7 100%);
      color: #fff;
      box-shadow: 0 4px 15px rgba(217, 70, 239, 0.3);
    }

    .btn-primary:hover:not(:disabled) {
      background: linear-gradient(135deg, #f472b6 0%, var(--accent) 100%);
      box-shadow: 0 6px 20px rgba(217, 70, 239, 0.5);
    }

    .btn-success {
      background: linear-gradient(135deg, #22c55e 0%, #15803d 100%);
      color: #fff;
      box-shadow: 0 4px 15px rgba(34, 197, 94, 0.3);
    }

    .btn-success:hover {
      background: linear-gradient(135deg, #4ade80 0%, #166534 100%);
      box-shadow: 0 6px 20px rgba(34, 197, 94, 0.5);
    }

    .btn-secondary {
      background: rgba(168, 85, 247, 0.2);
      border: 1px solid var(--glass-border);
      color: var(--text-main);
      font-size: 0.85rem;
      padding: 6px 12px;
      border-radius: 6px;
    }

    .btn-secondary:hover {
      background: rgba(168, 85, 247, 0.4);
      border-color: var(--accent);
    }

    .btn:disabled {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.05);
      color: rgba(255, 255, 255, 0.2);
      cursor: not-allowed;
      box-shadow: none;
    }

    .btn:active:not(:disabled) {
      transform: scale(0.98);
    }

    .card h3 {
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--text-main);
      border-bottom: 1px solid var(--glass-border);
      padding-bottom: 10px;
      letter-spacing: -0.01em;
    }

    .log-wrapper {
      background-color: var(--input-bg);
      border: 1px solid var(--glass-border);
      border-radius: 8px;
      height: 130px; 
      overflow-y: auto;
      padding: 14px;
    }

    #log {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
      font-family: "SF Mono",SFMono-Regular,Consolas,monospace;
      font-size: 0.8rem;
    }

    #log li {
      line-height: 1.5;
      word-break: break-all;
    }

    #log li.success { color: #4ade80; text-shadow: 0 0 8px rgba(74, 222, 128, 0.2); }
    #log li.error { color: #f87171; text-shadow: 0 0 8px rgba(248, 113, 113, 0.2); }
    #log li.info { color: #c084fc; opacity: 0.85; }

    .output-section {
      display: none;
      flex-direction: column;
      gap: 20px;
      border-top: 1px solid var(--glass-border);
      padding-top: 20px;
    }

    /* Side-by-Side Flex Split Setup */
    .tracklist-split-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
    }

    @media(min-width: 650px) {
      .tracklist-split-grid {
        grid-template-columns: 1fr 1fr;
      }
    }

    .tracker-box-container {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .tracker-header-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .tracker-box-container label {
      font-size: 0.85rem;
      color: var(--text-muted);
      font-weight: 600;
    }

    .loop-generator-row {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(168, 85, 247, 0.05);
      padding: 12px;
      border-radius: 10px;
      border: 1px solid rgba(168, 85, 247, 0.15);
    }

    .loop-generator-row label {
      font-size: 0.85rem;
      font-weight: 600;
      white-space: nowrap;
      color: var(--text-main);
    }

    .loop-input-inline {
      width: 90px;
      padding: 8px 12px;
      background: var(--input-bg);
      border: 1px solid var(--glass-border);
      color: #fff;
      border-radius: 6px;
      outline: none;
      font-size: 0.9rem;
    }

    .loop-input-inline:focus {
      border-color: var(--accent);
    }

    textarea {
      width: 100%;
      height: 220px;
      background: var(--input-bg);
      border: 1px solid var(--glass-border);
      color: #34d399;
      padding: 14px;
      border-radius: 10px;
      resize: vertical;
      font-family: "SF Mono",SFMono-Regular,Consolas,monospace;
      font-size: 0.85rem;
      outline: none;
      transition: border-color 0.2s;
    }

    textarea:focus {
      border-color: var(--accent);
    }

    audio {
      width: 100%;
      margin-top: 4px;
      border-radius: 20px;
    }
    
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(168, 85, 247, 0.3);
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: var(--accent);
    }
  </style>
</head>
<body>

<div class="app-container">
  <header class="app-header">
    <h1>Audio Studio Master Pipeline</h1>
    <p>Trims trailing silence, shuffles, crossfades, and renders an instant continuous master WAV file.</p>
  </header>

  <main class="app-body">
    <div class="card">
      <label for="audioFiles" class="drop-zone">
        <svg class="upload-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/>
        </svg>
        <span class="drop-zone-text" id="file-prompt">Click to select audio tracks</span>
        <span class="drop-zone-sub">Supports MP3, WAV, M4A, FLAC, etc.</span>
        <input type="file" id="audioFiles" accept="audio/*" multiple>
      </label>
      
      <div class="settings-grid">
        <div class="input-group">
          <label for="projectNameInput">Project / Mix Name</label>
          <input type="text" id="projectNameInput" class="input-field" value="My Epic Continuous Mix" placeholder="Enter output file name...">
        </div>
      </div>
      
      <div id="status" class="status-banner">Waiting for audio files...</div>
      <button id="processBtn" class="btn btn-primary w-full" disabled>Execute Master WAV Render</button>
    </div>

    <div class="card">
      <h3>Active Pipeline Log</h3>
      <div class="log-wrapper">
        <ul id="log">
          <li class="info">System operational. Ready for high-speed WAV compilation.</li>
        </ul>
      </div>

      <div class="output-section" id="output-section">
        <h3>Tracklist Timestamps</h3>
        
        <div class="loop-generator-row">
          <label for="postLoopCount">Calculate Repeated Tracklist:</label>
          <input type="number" id="postLoopCount" class="loop-input-inline" min="1" step="1" placeholder="e.g. 20">
          <label>times</label>
          <button id="calcLoopsBtn" class="btn btn-secondary" style="padding: 8px 16px; margin-left: auto;">Go</button>
        </div>

        <div class="tracklist-split-grid">
          <div class="tracker-box-container">
            <div class="tracker-header-row">
              <label>Original Tracklist (Unchanged)</label>
              <button class="btn btn-secondary" onclick="copyToClipboard('timestamp-box')">Copy</button>
            </div>
            <textarea id="timestamp-box" readonly></textarea>
          </div>

          <div class="tracker-box-container">
            <div class="tracker-header-row">
              <label id="looped-box-label">Repeated Tracklist</label>
              <button class="btn btn-secondary" onclick="copyToClipboard('looped-timestamp-box')">Copy</button>
            </div>
            <textarea id="looped-timestamp-box" placeholder="Enter loop count above and click Go to calculate variables... " readonly></textarea>
          </div>
        </div>
        
        <h3>Listen to Studio Mix Preview</h3>
        <audio id="audio-preview" controls></audio>

        <button id="downloadBtn" class="btn btn-success w-full">Download Master Mixtape WAV</button>
      </div>
    </div>
  </main>
</div>

<script>
let audioContext = null;
let selectedFiles = [];
let currentDownloadUrl = null;

// Track references needed for runtime calculations
let globalProcessedBuffers = [];
let globalProcessedTrackNames = [];
let globalRoundOneLength = 0;
const crossfadeDuration = 7; 

const fileInput = document.getElementById('audioFiles');
const filePrompt = document.getElementById('file-prompt');
const projectNameInput = document.getElementById('projectNameInput');
const postLoopCount = document.getElementById('postLoopCount');
const calcLoopsBtn = document.getElementById('calcLoopsBtn');
const processBtn = document.getElementById('processBtn');
const downloadBtn = document.getElementById('downloadBtn');
const statusDiv = document.getElementById('status');
const logList = document.getElementById('log');
const outputSection = document.getElementById('output-section');
const timestampBox = document.getElementById('timestamp-box');
const loopedTimestampBox = document.getElementById('looped-timestamp-box');
const loopedBoxLabel = document.getElementById('looped-box-label');
const audioPreview = document.getElementById('audio-preview');

fileInput.addEventListener('change', (e) => {
  selectedFiles = Array.from(e.target.files);
  outputSection.style.display = "none"; 
  
  if (selectedFiles.length > 0) {
    statusDiv.textContent = `${selectedFiles.length} files loaded into pool.`;
    filePrompt.textContent = `${selectedFiles.length} tracks queued!`;
    processBtn.disabled = false;
    addLog(`Loaded ${selectedFiles.length} files. Click "Execute Master WAV Render" to compile.`, "info");
  } else {
    statusDiv.textContent = "Waiting for audio files...";
    filePrompt.textContent = "Click to select audio tracks";
    processBtn.disabled = true;
  }
});

processBtn.addEventListener('click', async () => {
  if (selectedFiles.length === 0) return;
  
  if (!audioContext) {
    audioContext = new (window.AudioContext || window.webkitAudioContext)();
  }
  
  processBtn.disabled = true;
  fileInput.disabled = true;
  projectNameInput.disabled = true;
  outputSection.style.display = "none";
  loopedTimestampBox.value = "";
  postLoopCount.value = "";
  loopedBoxLabel.textContent = "Repeated Tracklist";
  logList.innerHTML = ""; 
  
  if (currentDownloadUrl) {
    URL.revokeObjectURL(currentDownloadUrl);
  }

  addLog("Phase 1: Shuffling track list...", "info");
  let processingPool = [...selectedFiles];
  shuffleArray(processingPool);

  globalProcessedBuffers = [];
  globalProcessedTrackNames = [];
  
  const scanWindowSeconds = 20; 
  const threshold = 0.006; 

  statusDiv.textContent = "Trimming silence...";

  for (let idx = 0; idx < processingPool.length; idx++) {
    const file = processingPool[idx];
    addLog(`[Trimmer Engine ${idx + 1}/${processingPool.length}] Analyzing: ${file.name}`);

    try {
      const arrayBuffer = await file.arrayBuffer();
      const audioBuffer = await audioContext.decodeAudioData(arrayBuffer);
      
      const sampleRate = audioBuffer.sampleRate;
      const totalSamples = audioBuffer.length;
      const numChannels = audioBuffer.numberOfChannels;
      
      const channelData = audioBuffer.getChannelData(0); 
      const scanSamplesStart = Math.max(0, totalSamples - (scanWindowSeconds * sampleRate));
      
      let lastActiveSample = totalSamples;
      let foundActiveSound = false;

      for (let i = totalSamples - 1; i >= scanSamplesStart; i--) {
        if (Math.abs(channelData[i]) > threshold) {
          lastActiveSample = i;
          foundActiveSound = true;
          break; 
        }
      }

      let finalBuffer = audioBuffer;
      let isTrimmed = false;
      let cutTime = 0;
      
      if (foundActiveSound && lastActiveSample < totalSamples - 1) {
        const trimmedLength = lastActiveSample;
        isTrimmed = true;
        cutTime = (totalSamples - trimmedLength) / sampleRate;
        
        finalBuffer = audioContext.createBuffer(numChannels, trimmedLength, sampleRate);
        for (let ch = 0; ch < numChannels; ch++) {
          finalBuffer.getChannelData(ch).set(
            audioBuffer.getChannelData(ch).subarray(0, trimmedLength)
          );
        }
      }

      if (isTrimmed) {
        addLog(`  ✅ Sliced ${cutTime.toFixed(2)}s of silence from tail.`, "success");
      } else {
        addLog(`  ℹ️ No quiet pocket detected. Retaining original length.`, "info");
      }

      globalProcessedBuffers.push(finalBuffer);
      globalProcessedTrackNames.push(cleanTrackName(file.name));

    } catch (err) {
      addLog(`  ❌ Processing Breakdown on "${file.name}": ${err.message}`, "error");
      console.error(err);
    }
  }

  if (globalProcessedBuffers.length === 0) {
    addLog("❌ Critical error: No audio tracks successfully decoded.", "error");
    resetInterface();
    return;
  }

  statusDiv.textContent = "Calculating timeline...";
  addLog(`Phase 3: Calculating continuous multi-track ${crossfadeDuration}s crossfade timeline...`, "info");

  let timeline = [];
  let currentTime = 0;
  let timestamps = [];

  for (let i = 0; i < globalProcessedBuffers.length; i++) {
    const buffer = globalProcessedBuffers[i];
    
    timestamps.push(`${formatTime(currentTime)} - ${globalProcessedTrackNames[i]}`);
    
    timeline.push({
      buffer: buffer,
      startTime: currentTime,
      duration: buffer.duration
    });

    if (i < globalProcessedBuffers.length - 1) {
      currentTime += (buffer.duration - crossfadeDuration); 
    } else {
      currentTime += buffer.duration;
    }
  }

  globalRoundOneLength = currentTime;
  timestamps.push(`${formatTime(globalRoundOneLength)} - Loop`);
  timestampBox.value = timestamps.join('\n');

  statusDiv.textContent = "Rendering crossfades...";
  addLog(`Phase 4: Executing ${crossfadeDuration}s crossfaders via high-precision Offline Audio Context...`, "info");

  const totalDuration = currentTime;
  const sampleRate = 44100;
  
  const offlineCtx = new OfflineAudioContext(2, Math.ceil(sampleRate * totalDuration), sampleRate);

  timeline.forEach((item) => {
    const source = offlineCtx.createBufferSource();
    const gainNode = offlineCtx.createGain();
    source.buffer = item.buffer;

    gainNode.gain.setValueAtTime(0, item.startTime);
    gainNode.gain.linearRampToValueAtTime(1, item.startTime + crossfadeDuration);

    const fadeOutStart = item.startTime + item.duration - crossfadeDuration;
    gainNode.gain.setValueAtTime(1, fadeOutStart);
    gainNode.gain.linearRampToValueAtTime(0, item.startTime + item.duration);

    source.connect(gainNode);
    gainNode.connect(offlineCtx.destination);
    
    source.start(item.startTime);
  });

  const renderedBuffer = await offlineCtx.startRendering();

  statusDiv.textContent = "Packaging WAV container...";
  addLog("Phase 5: Instantly packaging master data blocks using native array copying...", "info");
  
  const wavBlob = bufferToWavFast(renderedBuffer);
  
  currentDownloadUrl = URL.createObjectURL(wavBlob);
  audioPreview.src = currentDownloadUrl;
  
  const sanitizedProjectName = projectNameInput.value.trim().replace(/[^a-zA-Z0-9-_ ]/g, '') || 'Mixtape';
  downloadBtn.onclick = () => {
    const a = document.createElement('a');
    a.href = currentDownloadUrl;
    a.download = `${sanitizedProjectName}.wav`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  };

  statusDiv.textContent = "Production Complete!";
  addLog("🎉 Success! Your master mix has been generated instantly.", "success");
  
  outputSection.style.display = "flex";
  resetInterface();
});

// Post-Render Loop Calculations Handler Click Event
calcLoopsBtn.addEventListener('click', () => {
  const totalRunsVal = parseInt(postLoopCount.value, 10);
  if (isNaN(totalRunsVal) || totalRunsVal <= 0) {
    alert("Please enter a valid number of loops first.");
    return;
  }

  if (globalProcessedBuffers.length === 0) return;

  let loopedTimestamps = [];
  let loopRunningTime = 0;

  // Run through the total requested loops (Run 1 = Original beginning at 0:00)
  for (let l = 0; l < totalRunsVal; l++) {
    
    // Inject the separation line right before starting the second run (the first repeat)
    if (l === 1) {
      loopedTimestamps.push("--------");
    }

    for (let i = 0; i < globalProcessedBuffers.length; i++) {
      const buffer = globalProcessedBuffers[i];
      loopedTimestamps.push(`${formatTime(loopRunningTime)} - ${globalProcessedTrackNames[i]}`);
      
      if (i < globalProcessedBuffers.length - 1) {
        loopRunningTime += (buffer.duration - crossfadeDuration);
      } else {
        loopRunningTime += buffer.duration;
      }
    }
  }
  loopedTimestamps.push(`${formatTime(loopRunningTime)} - End of Loops`);
  
  loopedBoxLabel.textContent = `Repeated Tracklist (${totalRunsVal} Total Mix Runs)`;
  loopedTimestampBox.value = loopedTimestamps.join('\n');
});

function copyToClipboard(elementId) {
  const textarea = document.getElementById(elementId);
  if (!textarea.value) return;
  
  textarea.select();
  textarea.setSelectionRange(0, 99999); // standard support metric
  navigator.clipboard.writeText(textarea.value).then(() => {
    addLog("📋 Text copied directly to system clipboard.", "info");
  }).catch(() => {
    alert("Failed to copy text safely.");
  });
}

function resetInterface() {
  processBtn.disabled = false;
  fileInput.disabled = false;
  projectNameInput.disabled = false;
}

function shuffleArray(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
  return array;
}

function cleanTrackName(name) {
  let clean = name.replace(/\.[^/.]+$/, ""); 
  clean = clean.replace(/\s*\([^)]*\)/g, ""); 
  clean = clean.replace(/^[\s,,-]+/, "");     
  return clean.trim();
}

function addLog(text, className = "") {
  const li = document.createElement('li');
  li.textContent = text;
  if (className) li.classList.add(className);
  logList.appendChild(li);
  const wrapper = logList.parentElement;
  wrapper.scrollTop = wrapper.scrollHeight;
}

function formatTime(seconds) {
  const h = Math.floor(seconds / 3600);
  const m = Math.floor((seconds % 3600) / 60);
  const s = Math.floor(seconds % 60);
  
  if (h > 0) {
    return `${h}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
  }
  return `${m}:${s.toString().padStart(2, '0')}`;
}

function bufferToWavFast(buffer) {
  const sampleRate = buffer.sampleRate;
  const numSamples = buffer.length;
  const numChannels = 2; 
  
  const bytesPerSample = 2; 
  const blockAlign = numChannels * bytesPerSample;
  const dataSize = numSamples * blockAlign;
  const headerSize = 44;
  const totalSize = headerSize + dataSize;
  
  const arrayBuffer = new ArrayBuffer(totalSize);
  const dataView = new DataView(arrayBuffer);
  
  const writeString = (offset, string) => {
    for (let i = 0; i < string.length; i++) {
      dataView.setUint8(offset + i, string.charCodeAt(i));
    }
  };

  writeString(0, 'RIFF');
  dataView.setUint32(4, totalSize - 8, true);
  writeString(8, 'WAVE');
  writeString(12, 'fmt ');
  dataView.setUint32(16, 16, true); 
  dataView.setUint16(20, 1, true);  
  dataView.setUint16(22, numChannels, true);
  dataView.setUint32(24, sampleRate, true);
  dataView.setUint32(28, sampleRate * blockAlign, true); 
  dataView.setUint16(32, blockAlign, true);
  dataView.setUint16(34, bytesPerSample * 8, true); 
  writeString(36, 'data');
  dataView.setUint32(40, dataSize, true);

  const leftChan = buffer.getChannelData(0);
  const rightChan = buffer.numberOfChannels > 1 ? buffer.getChannelData(1) : leftChan;
  
  const pcmBufferView = new Int16Array(arrayBuffer, headerSize);
  
  let viewIdx = 0;
  for (let s = 0; s < numSamples; s++) {
    let sampleL = leftChan[s];
    if (sampleL > 1) sampleL = 1;
    else if (sampleL < -1) sampleL = -1;
    pcmBufferView[viewIdx++] = sampleL < 0 ? sampleL * 0x8000 : sampleL * 0x7FFF;

    let sampleR = rightChan[s];
    if (sampleR > 1) sampleR = 1;
    else if (sampleR < -1) sampleR = -1;
    pcmBufferView[viewIdx++] = sampleR < 0 ? sampleR * 0x8000 : sampleR * 0x7FFF;
  }

  return new Blob([arrayBuffer], { type: 'audio/wav' });
}
